# Example: Full Conversion Mode with TLS
#
# This example demonstrates creating both Gateway and HTTPRoute resources.
# The Gateway will be created with HTTPS listener and TLS termination.

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: example-host-header
  namespace: default
  annotations:
    ingress2gateway.io/enabled: "true"
    nginx.ingress.kubernetes.io/upstream-vhost: "google.com"
spec:
  ingressClassName: nginx-internal
  rules:
  - host: hostheader.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app-service
            port:
              number: 80
