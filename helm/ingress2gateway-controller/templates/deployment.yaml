apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ingress2gateway-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ingress2gateway-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ingress2gateway-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ingress2gateway-controller.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ingress2gateway-controller.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: controller
          image: {{ include "ingress2gateway-controller.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /controller
          args:
            {{- if .Values.controller.leaderElection }}
            - --leader-elect
            {{- end }}
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            {{- if .Values.controller.defaultProvider }}
            - --source-provider={{ .Values.controller.defaultProvider }}
            {{- end }}
            {{- if .Values.controller.defaultEmitter }}
            - --emitter={{ .Values.controller.defaultEmitter }}
            {{- end }}
            {{- if .Values.controller.ingressClassToGatewayClassMapping }}
            {{- range $class, $gw := .Values.controller.ingressClassToGatewayClassMapping }}
            - --ingress-class-to-gateway-class-mapping={{ printf "%s=%s" $class $gw }}
            {{- end }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
