name: Push Helm Chart

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  push-helm:
    name: Push Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and Push Helm Chart
        run: |
          CHART_PATH="helm/ingress2gateway-controller"
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          
          # Update the version in Chart.yaml to match the tag
          sed -i "s/^version: .*/version: ${TAG_VERSION}/" ${CHART_PATH}/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${TAG_VERSION}\"/" ${CHART_PATH}/Chart.yaml
          
          CHART_NAME=$(grep '^name:' ${CHART_PATH}/Chart.yaml | awk '{print $2}')
          
          echo "Packaging chart ${CHART_NAME} version ${TAG_VERSION}"
          helm package ${CHART_PATH}
          
          echo "Pushing chart to GitHub Container Registry (ghcr.io)"
          helm push ${CHART_NAME}-${TAG_VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}

      - name: Upload Helm Chart to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
